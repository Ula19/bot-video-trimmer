services:
  # Бот
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # URL Local Bot API (контейнер bot-api) — файлы до 2 ГБ
      BOT_API_URL: http://bot-api:8081
    depends_on:
      postgres:
        condition: service_healthy
      bot-api:
        condition: service_started
    volumes:
      # tmp для обрабатываемых видео
      - /tmp/trimmer_bot:/tmp/trimmer_bot
      # доступ к файлам Local Bot API
      - bot-api-data:/var/lib/telegram-bot-api

  # Local Bot API — файлы до 2 ГБ без ограничений
  bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      - "${BOT_API_PORT:-8081}:8081"
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
      - /tmp/trimmer_bot:/tmp/trimmer_bot

  # Автоперезапуск unhealthy контейнеров
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bot_4_trimmer}
      POSTGRES_USER: ${DB_USER:-bot_4_trimmer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot_4_trimmer} -d ${DB_NAME:-bot_4_trimmer}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  bot-api-data:
